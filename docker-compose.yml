services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      TOKEN: ${TOKEN}
      SITE_USER: ${SITE_USER}
      SITE_PASSWORD: ${SITE_PASSWORD}
      SECRET_KEY: ${SECRET_KEY:-troque-em-producao}
      MONGO_URL: mongodb://sinape:${MONGO_PASSWORD}@db:27017/?authSource=admin
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-25}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MONTADOR_MODO_LOCAL: ${MONTADOR_MODO_LOCAL:-}
      MONTADOR_TENANT_ID: ${MONTADOR_TENANT_ID:-}
      MONTADOR_CLIENT_ID: ${MONTADOR_CLIENT_ID:-}
      MONTADOR_CLIENT_SECRET: ${MONTADOR_CLIENT_SECRET:-}
      MONTADOR_ONEDRIVE_RAIZ: ${MONTADOR_ONEDRIVE_RAIZ:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: sinape
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh -u sinape -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --quiet --eval \"db.adminCommand('ping')\""]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  uploads:
  mongodata:
