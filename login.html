<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINAPE — Entrar</title>
<style>
:root {
  --teal: #0d5c63;
  --teal-mid: #1a8a8a;
  --teal-l: #e6f4f4;
  --slate: #1e293b;
  --slate-mid: #475569;
  --slate-l: #94a3b8;
  --border: #d1dae6;
  --bg: #f1f5f9;
  --white: #ffffff;
  --red: #b91c1c;
  --red-l: #fef2f2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--slate);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  width: 100%;
  max-width: 400px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px 24px;
  box-shadow: 0 12px 32px rgba(15, 23, 42, .08);
}
.brand {
  color: var(--teal);
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: .04em;
  margin-bottom: 6px;
}
h1 { font-size: 1.35rem; margin-bottom: 6px; }
.hint { font-size: .82rem; color: var(--slate-mid); margin-bottom: 18px; line-height: 1.5; }
label { display: block; font-size: .78rem; font-weight: 700; color: var(--slate-mid); margin-bottom: 6px; }
input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: .9rem;
  margin-bottom: 14px;
}
input:focus { outline: none; border-color: var(--teal-mid); box-shadow: 0 0 0 3px var(--teal-l); }
button {
  width: 100%;
  border: none;
  border-radius: 8px;
  padding: 11px 14px;
  font-size: .88rem;
  font-weight: 700;
  background: var(--teal);
  color: #fff;
  cursor: pointer;
}
button:hover { background: var(--teal-mid); }
.erro {
  background: var(--red-l);
  border: 1px solid #fca5a5;
  color: var(--red);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: .78rem;
  margin-bottom: 14px;
}
</style>
</head>
<body>
<div class="card">
  <div class="brand">SINAPE · Painel de Licitações</div>
  <h1>Entrar</h1>
  <p class="hint">Acesso restrito à equipe. Use o usuário e a senha configurados no servidor.</p>
  <div id="login-erro" class="erro" style="display:none;">Usuário ou senha incorretos.</div>
  <form method="post" action="/login">
    <input type="hidden" name="next" id="next" value="/">
    <label for="usuario">Usuário</label>
    <input type="text" id="usuario" name="usuario" autocomplete="username" required autofocus>
    <label for="senha">Senha</label>
    <input type="password" id="senha" name="senha" autocomplete="current-password" required>
    <button type="submit">Entrar</button>
  </form>
</div>
<script>
const params = new URLSearchParams(window.location.search);
if (params.get('erro')) document.getElementById('login-erro').style.display = 'block';
const next = params.get('next');
if (next && next.startsWith('/') && !next.startsWith('//')) {
  document.getElementById('next').value = next;
}
</script>
</body>
</html>
